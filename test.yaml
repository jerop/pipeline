apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: task
spec:
  description: this is a task
  steps:
    - name: step-one
      image: python
      script: |
        #!/usr/bin/env python3
        import time
        for i in range(60):
          time.sleep(20)
          print("sleeping for 10 seconds", flush=True)
          print("this is a task", flush=True)
---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: pipeline-test
spec:
  tasks:
    - name: run-script-1
      taskRef:
        name: task
        kind: Task
    - name: run-script-2
      taskRef:
        name: task
        kind: Task
  finally:
    - name: final-task
      taskRef:
        name: task
        kind: task
